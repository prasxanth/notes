/* ─── DESIGN TOKENS ──────────────────────────────────────── */
:root {
  --bg:      #0d0d0b;
  --bg2:     #141412;

  --bg4:     #232320;
  --bg5:     #2a2a26;

  --gold:    #c8a96e;

  --teal:    #5DCAA5;

  --sans:    'Nunito', system-ui, sans-serif;

  --mono:    'DM Mono', monospace;

  --r-lg:    16px;
}

/* ─── RESET ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: var(--sans); color: var(--text); overscroll-behavior: none; font-size: 15px; line-height: 1.6; }

/* ─── APP SHELL ──────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.status-bar { height: var(--safe-t); background: var(--bg); flex-shrink: 0; }

/* ─── HEADER ─────────────────────────────────────────────── */
.app-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 10px;
}
.app-header-logo {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;

}
.app-header-icon {
  width: 32px; height: 32px;

  border-radius: var(--r-sm); cursor: pointer; flex-shrink: 0;
  transition: background 0.15s;
}
.app-header-icon:active { background: var(--bg4); }
.app-header-icon svg { width: 16px; height: 16px; stroke: var(--text3); }

/* ─── SEARCH BAR ─────────────────────────────────────────── */

  border-bottom: 1px solid var(--border);

  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 0 12px;
  gap: 8px;
}
.search-input-wrap svg { width: 14px; height: 14px; stroke: var(--text3); flex-shrink: 0; }
.search-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  padding: 9px 0;
  min-width: 0;
}
.search-input::placeholder { color: var(--text3); }
.search-clear {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--bg5);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.search-clear.visible { display: flex; }
.search-clear svg { width: 10px; height: 10px; stroke: var(--text3); }

/* ─── FILTER STRIP ───────────────────────────────────────── */
.filter-strip {
  flex-shrink: 0;
  display: flex;
  gap: 7px;
  padding: 8px 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.filter-strip::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.06em;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  text-transform: uppercase;
}
.filter-chip:active { opacity: 0.7; }
.filter-chip.active { background: rgba(200,169,110,0.15); border-color: var(--gold); color: var(--gold); }
.filter-chip .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.7; }

/* ─── SORT / STATS BAR ───────────────────────────────────── */
.list-meta {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 6px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.list-meta-count {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.06em;
  flex: 1;
}
.sort-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.06em;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.sort-btn:active { background: var(--bg4); }
.sort-btn.active-sort { color: var(--teal); border-color: rgba(93,202,165,0.3); background: rgba(93,202,165,0.07); }
.sort-btn svg { width: 10px; height: 10px; stroke: currentColor; }

/* ─── CONTENT ────────────────────────────────────────────── */
#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}

/* ─── BOOK LIST ──────────────────────────────────────────── */
.book-list { padding: 8px 0 24px; }

/* ─── BOOK CARD ──────────────────────────────────────────── */
.book-card {
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: background 0.15s;
  overflow: hidden;
}
.book-card:active { background: var(--bg2); }
.book-card-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 16px 12px;
}
.book-spine {
  width: 36px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 2px;
  gap: 6px;
}
.book-spine-icon {
  width: 36px; height: 48px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--bg);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.book-spine-icon::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;

  background: rgba(255,255,255,0.15);
}
.book-main { flex: 1; min-width: 0; }
.book-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 3px;
}
.book-author {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.book-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.book-pill {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.pill-impact-5 { background: rgba(200,169,110,0.18); color: var(--gold2); border-color: rgba(200,169,110,0.3); }
.pill-impact-4 { background: rgba(93,202,165,0.12); color: var(--teal2); border-color: rgba(93,202,165,0.25); }
.pill-impact-3 { background: rgba(255,255,255,0.05); color: var(--text3); border-color: var(--border2); }
.pill-audio { background: rgba(93,202,165,0.10); color: var(--teal); border-color: rgba(93,202,165,0.2); }
.pill-reread { background: rgba(212,144,26,0.12); color: var(--amber2); border-color: rgba(212,144,26,0.25); }
.pill-fiction { background: rgba(143,135,224,0.10); color: #CECBF6; border-color: rgba(143,135,224,0.2); }
.pill-nonfiction { background: rgba(224,112,96,0.10); color: #F0A898; border-color: rgba(224,112,96,0.2); }
.pill-rec { background: rgba(93,202,165,0.12); color: var(--teal2); border-color: rgba(93,202,165,0.2); }

.book-card-chevron {
  flex-shrink: 0;

  padding-top: 14px;

}

/* ─── BOOK DETAIL PANEL ──────────────────────────────────── */
.book-detail {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);

  animation: slideDown 0.2s ease;
}
.book-detail.open { display: block; }
@keyframes slideDown { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

.detail-section { margin-top: 14px; }
.detail-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.12em;

}
.detail-themes { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
.theme-chip {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.05em;
  padding: 3px 9px;

  border: 1px solid rgba(200,169,110,0.2);

.detail-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;

}
.detail-meta-val {
  font-size: 13px;

}

.detail-notes {
  background: var(--bg3);
  border-left: 2px solid var(--gold);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 9px 12px;

/* ─── EMPTY STATE ────────────────────────────────────────── */
.empty-state {

  flex-direction: column;

.empty-title { font-family: var(--serif); font-size: 18px; color: var(--text2); }
.empty-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; }

/* ─── BOTTOM NAV ─────────────────────────────────────────── */
.bottom-nav {
  flex-shrink: 0;
  display: flex;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  padding-bottom: var(--safe-b);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 9px 4px;
  border: none;
  background: transparent;
  cursor: pointer;
  transition: opacity 0.15s;
}
.nav-btn:active { opacity: 0.55; }
.nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.nav-icon svg { width: 20px; height: 20px; }
.nav-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); transition: color 0.15s; }
.nav-btn.active .nav-label { color: var(--gold); }
.nav-btn.active .nav-icon svg { stroke: var(--gold); }
.nav-btn:not(.active) .nav-icon svg { stroke: var(--text3); }

/* ─── STATS SCREEN ───────────────────────────────────────── */
.stats-screen { padding: 20px 16px 32px; display: none; min-height: 100%; }
.stats-screen.active { display: block; }
.screen-header { margin-bottom: 22px; }
.screen-header h2 { font-family: var(--serif); font-size: 24px; font-weight: 500; color: var(--gold2); margin-bottom: 4px; }
.screen-header p { font-size: 13px; color: var(--text3); font-style: italic; }

.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-num { font-family: var(--serif); font-size: 32px; font-weight: 400; color: var(--gold2); line-height: 1; }
.stat-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-top: 4px; }
.stat-sub { font-size: 12px; color: var(--text3); }

.bar-chart { margin-top: 18px; }
.bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-label { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; min-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 5px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: var(--gold); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.bar-count { font-family: var(--mono); font-size: 9px; color: var(--text3); min-width: 20px; text-align: right; }

.section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; margin-top: 22px; }

/* ─── THEME COLORS ───────────────────────────────────────── */
.tc-0  { background: #7B5EA7; }
.tc-1  { background: #5DCAA5; }
.tc-2  { background: #E07060; }
.tc-3  { background: #c8a96e; }
.tc-4  { background: #6B9DC2; }
.tc-5  { background: #A67C52; }
.tc-6  { background: #7EA67E; }
.tc-7  { background: #C27A5A; }
.tc-8  { background: #8F87E0; }
.tc-9  { background: #D4901A; }
.tc-10 { background: #5A8F8F; }
.tc-11 { background: #A05A8F; }
.tc-12 { background: #6B8F5A; }
.tc-13 { background: #8F6B5A; }
.tc-14 { background: #5A6B8F; }
.tc-15 { background: #8F5A6B; }

</style>

<body>
<div id="app">
  <div class="status-bar"></div>

  <!-- Header -->
  <div class="app-header">
    <div class="app-header-logo">Book Navigator</div>
    <div class="app-header-count" id="header-count"></div>
    <div class="app-header-icon" id="sort-toggle" title="Toggle sort">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M7 12h10M11 18h2"/>
      </svg>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="search-input" type="search" placeholder="Search title, author, notes…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="search-clear" aria-label="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Theme filter chips -->
  <div class="filter-strip" id="filter-strip">
    <div class="filter-chip active" data-theme="all">
      <span class="chip-dot"></span>All
    </div>
    <!-- theme chips injected by JS -->
  </div>

  <!-- List meta bar -->
  <div class="list-meta">
    <div class="list-meta-count" id="list-meta-count"></div>
    <button class="sort-btn" id="sort-alpha" data-sort="alpha">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h10M4 18h6"/></svg>A–Z
    </button>
    <button class="sort-btn" id="sort-impact" data-sort="impact">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Impact
    </button>
  </div>

  <!-- Content area -->
  <div id="content">
    <!-- Library screen -->
    <div id="screen-library">
      <div class="book-list" id="book-list"></div>
    </div>
    <!-- Stats screen -->
    <div class="stats-screen" id="screen-stats"></div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-library" onclick="switchScreen('library')">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <span class="nav-label">Library</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="switchScreen('stats')">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 20V10M12 20V4M6 20v-6"/>
        </svg>
      </div>
      <span class="nav-label">Insights</span>
    </button>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const BOOKS = JSON.parse(document.getElementById('embeddedData').textContent);

// ─── THEME PALETTE ───────────────────────────────────────────────────────────
const ALL_THEMES = [...new Set(BOOKS.flatMap(b => b.themes))].sort();
const THEME_IDX  = Object.fromEntries(ALL_THEMES.map((t,i) => [t, i]));

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeTheme  = 'all';
let searchQuery  = '';
let sortMode     = 'alpha'; // alpha | impact
let expandedIdx  = null;
let currentScreen = 'library';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function impactStars(val) {
  if (!val) return '';
  const n = parseFloat(val);
  if (isNaN(n)) return '';
  return '★'.repeat(Math.round(n)) + '☆'.repeat(5 - Math.round(n));
}

function impactClass(val) {
  if (!val) return 'pill-impact-3';
  const n = parseFloat(val);
  if (n >= 5) return 'pill-impact-5';
  if (n >= 4) return 'pill-impact-4';
  return 'pill-impact-3';
}

function initials(title) {
  return title.replace(/^(The|A|An) /i, '').charAt(0).toUpperCase();
}

function filteredBooks() {
  let books = BOOKS.slice();
  if (activeTheme !== 'all') {
    books = books.filter(b => b.themes.includes(activeTheme));
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    books = books.filter(b =>
      b.title.toLowerCase().includes(q) ||
      b.author.toLowerCase().includes(q) ||
      (b.optional.Notes || '').toLowerCase().includes(q) ||
      (b.optional.Genre || '').toLowerCase().includes(q) ||
      b.themes.some(t => t.toLowerCase().includes(q))
    );
  }
  if (sortMode === 'impact') {
    books.sort((a,b) => {
      const ia = parseFloat(a.optional['Impact (1–5)'] || 0);
      const ib = parseFloat(b.optional['Impact (1–5)'] || 0);
      return ib - ia || a.title.localeCompare(b.title);
    });
  } else {
    books.sort((a,b) => {
      const ta = a.title.replace(/^(The|A|An) /i,'');
      const tb = b.title.replace(/^(The|A|An) /i,'');
      return ta.localeCompare(tb);
    });
  }
  return books;
}

// ─── RENDER FILTER CHIPS ──────────────────────────────────────────────────────
function renderFilterChips() {
  const strip = document.getElementById('filter-strip');
  // Remove existing theme chips (keep "All")
  [...strip.querySelectorAll('[data-theme]:not([data-theme="all"])')].forEach(e => e.remove());

  ALL_THEMES.forEach(theme => {
    const div = document.createElement('div');
    div.className = 'filter-chip' + (activeTheme === theme ? ' active' : '');
    div.dataset.theme = theme;
    div.innerHTML = `<span class="chip-dot"></span>${theme}`;
    div.onclick = () => setTheme(theme);
    strip.appendChild(div);
  });

  strip.querySelector('[data-theme="all"]').className =
    'filter-chip' + (activeTheme === 'all' ? ' active' : '');
}

function setTheme(theme) {
  activeTheme = theme;
  expandedIdx = null;
  renderFilterChips();
  renderList();
}

// ─── RENDER BOOK LIST ─────────────────────────────────────────────────────────
function renderList() {
  const books = filteredBooks();
  const list  = document.getElementById('book-list');
  const meta  = document.getElementById('list-meta-count');
  const hdr   = document.getElementById('header-count');

  meta.textContent  = `${books.length} of ${BOOKS.length} books`;
  hdr.textContent   = `${BOOKS.length} titles`;

  if (!books.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <div class="empty-title">No books found</div>
        <div class="empty-sub">Try a different search or filter</div>
      </div>`;
    return;
  }

  list.innerHTML = books.map((book, localIdx) => {
    const globalIdx = BOOKS.indexOf(book);
    const themeIdx  = THEME_IDX[book.themes[0]] || 0;
    const impact    = book.optional['Impact (1–5)'];
    const audio     = book.optional['Audiobook'] === 'Y';
    const reread    = book.optional['Re-read?'] === 'Y';
    const fic       = book.optional['Fiction/Nonfiction'];
    const rec       = book.optional['Would Recommend'];
    const isExpanded = expandedIdx === globalIdx;

    let pills = '';
    if (impact) pills += `<span class="book-pill ${impactClass(impact)}">${impact.replace('.0','')}★</span>`;
    if (audio)  pills += `<span class="book-pill pill-audio">▶ Audio</span>`;
    if (reread) pills += `<span class="book-pill pill-reread">↺ Re-read</span>`;
    if (fic)    pills += `<span class="book-pill ${fic.toLowerCase().startsWith('non') ? 'pill-nonfiction' : 'pill-fiction'}">${fic}</span>`;

    let detailHtml = '';
    if (isExpanded) {
      const themeChips = book.themes.map(t =>
        `<span class="theme-chip" onclick="event.stopPropagation();setTheme('${t.replace(/'/g,"\\'")}');">${t}</span>`
      ).join('');

      const metaItems = [];
      if (book.optional['Genre'])           metaItems.push(['Genre', book.optional['Genre']]);
      if (book.optional['Completion Date'])  metaItems.push(['Read', book.optional['Completion Date']]);
      if (impact)                            metaItems.push(['Impact', `<span class="stars">${impactStars(impact)}</span>`]);
      if (rec)                               metaItems.push(['Recommend', rec === 'Y' ? '✓ Yes' : '✗ No']);

      const metaGrid = metaItems.map(([k,v]) =>
        `<div class="detail-meta-item"><div class="detail-meta-key">${k}</div><div class="detail-meta-val ${k==='Impact'?'stars':''}">${v}</div></div>`
      ).join('');

      const notesHtml = book.optional['Notes']
        ? `<div class="detail-section"><div class="detail-label">Notes</div><div class="detail-notes">${book.optional['Notes']}</div></div>`
        : '';

      detailHtml = `
        <div class="book-detail open" id="detail-${globalIdx}">
          <div class="detail-section">
            <div class="detail-label">Themes</div>
            <div class="detail-themes">${themeChips}</div>
          </div>
          ${metaGrid ? `<div class="detail-section"><div class="detail-meta-grid">${metaGrid}</div></div>` : ''}
          ${notesHtml}
        </div>`;
    } else {
      detailHtml = `<div class="book-detail" id="detail-${globalIdx}"></div>`;
    }

    return `
      <div class="book-card${isExpanded?' expanded':''}" data-idx="${globalIdx}" onclick="toggleExpand(${globalIdx})">
        <div class="book-card-header">
          <div class="book-spine">
            <div class="book-spine-icon tc-${themeIdx % 19}">${initials(book.title)}</div>
          </div>
          <div class="book-main">
            <div class="book-title">${book.title}</div>
            <div class="book-author">${book.author}</div>
            <div class="book-pills">${pills}</div>
          </div>
          <div class="book-card-chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </div>
        </div>
        ${detailHtml}
      </div>`;
  }).join('');
}

function toggleExpand(globalIdx) {
  expandedIdx = expandedIdx === globalIdx ? null : globalIdx;
  renderList();
  // Scroll the card into view
  setTimeout(() => {
    const card = document.querySelector(`[data-idx="${globalIdx}"]`);
    if (card && expandedIdx === globalIdx) {
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, 50);
}

// ─── STATS SCREEN ─────────────────────────────────────────────────────────────
function renderStats() {
  const screen = document.getElementById('screen-stats');
  const total  = BOOKS.length;
  const fiveStars = BOOKS.filter(b => parseFloat(b.optional['Impact (1–5)']||0) >= 5).length;
  const audioCount = BOOKS.filter(b => b.optional['Audiobook'] === 'Y').length;
  const recCount   = BOOKS.filter(b => b.optional['Would Recommend'] === 'Y').length;
  const rereadCount = BOOKS.filter(b => b.optional['Re-read?'] === 'Y').length;
  const fictionCount = BOOKS.filter(b => b.optional['Fiction/Nonfiction'] === 'Fiction').length;

  // Theme distribution
  const themeCounts = {};
  BOOKS.forEach(b => b.themes.forEach(t => { themeCounts[t] = (themeCounts[t]||0)+1; }));
  const themesSorted = Object.entries(themeCounts).sort((a,b)=>b[1]-a[1]);
  const maxTheme = themesSorted[0][1];

  const barRows = themesSorted.map(([theme, count]) => {
    const pct = Math.round(count / maxTheme * 100);
    const ci  = THEME_IDX[theme] || 0;
    return `
      <div class="bar-item">
        <div class="bar-label" title="${theme}">${theme}</div>
        <div class="bar-track"><div class="bar-fill tc-${ci % 19}" style="width:${pct}%"></div></div>
        <div class="bar-count">${count}</div>
      </div>`;
  }).join('');

  // Impact distribution
  const impactBuckets = {5:0,4:0,3:0,2:0,1:0};
  BOOKS.forEach(b => {
    const n = parseFloat(b.optional['Impact (1–5)']||0);
    if (n >= 1 && n <= 5) impactBuckets[Math.round(n)]++;
  });

  screen.innerHTML = `
    <div class="screen-header">
      <h2>Insights</h2>
      <p>At a glance across the library</p>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num">${total}</div>
        <div class="stat-lbl">Total Books</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${fiveStars}</div>
        <div class="stat-lbl">5-Star Reads</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num">${audioCount}</div>
        <div class="stat-lbl">Audiobooks</div>
        <div class="stat-sub">${Math.round(audioCount/total*100)}% of library</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${recCount}</div>
        <div class="stat-lbl">Recommended</div>
        <div class="stat-sub">${Math.round(recCount/total*100)}% of library</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num">${fictionCount}</div>
        <div class="stat-lbl">Fiction</div>
        <div class="stat-sub">${total - fictionCount} nonfiction</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${rereadCount}</div>
        <div class="stat-lbl">Would Re-read</div>
      </div>
    </div>

    <div class="section-label">Impact Distribution</div>
    <div class="bar-chart">
      ${[5,4,3,2,1].map(n => `
        <div class="bar-item">
          <div class="bar-label">${'★'.repeat(n)}${'☆'.repeat(5-n)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round((impactBuckets[n]||0)/total*100)}%;background:var(--gold)"></div></div>
          <div class="bar-count">${impactBuckets[n]||0}</div>
        </div>`).join('')}
    </div>

    <div class="section-label">Themes</div>
    <div class="bar-chart">${barRows}</div>
  `;
}

// ─── SCREEN SWITCHING ─────────────────────────────────────────────────────────
function switchScreen(screen) {
  currentScreen = screen;
  document.getElementById('screen-library').style.display = screen === 'library' ? 'block' : 'none';
  document.getElementById('screen-stats').classList.toggle('active', screen === 'stats');

  document.getElementById('nav-library').classList.toggle('active', screen === 'library');
  document.getElementById('nav-stats').classList.toggle('active', screen === 'stats');

  // Show/hide search + filter for library only
  document.querySelector('.search-wrap').style.display = screen === 'library' ? '' : 'none';
  document.getElementById('filter-strip').style.display = screen === 'library' ? '' : 'none';
  document.querySelector('.list-meta').style.display = screen === 'library' ? '' : 'none';

  if (screen === 'stats') renderStats();
}

// ─── SORT ────────────────────────────────────────────────────────────────────
document.getElementById('sort-alpha').addEventListener('click', () => {
  sortMode = 'alpha';
  updateSortUI();
  renderList();
});
document.getElementById('sort-impact').addEventListener('click', () => {
  sortMode = 'impact';
  updateSortUI();
  renderList();
});

function updateSortUI() {
  document.getElementById('sort-alpha').classList.toggle('active-sort', sortMode === 'alpha');
  document.getElementById('sort-impact').classList.toggle('active-sort', sortMode === 'impact');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  searchClear.classList.toggle('visible', !!searchQuery);
  expandedIdx = null;
  renderList();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchClear.classList.remove('visible');
  expandedIdx = null;
  renderList();
});

// ─── FILTER CHIP "All" ────────────────────────────────────────────────────────
document.querySelector('[data-theme="all"]').addEventListener('click', () => setTheme('all'));

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderFilterChips();
renderList();
updateSortUI();
switchScreen('library');
</script>
</body>
</html>
